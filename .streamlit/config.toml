# ============================================================
# .streamlit/config.toml - Streamlit Configuration
# ============================================================
# This file configures the Streamlit app's appearance and behavior.
# It's read automatically by Streamlit when the app starts.
# ============================================================

[theme]
# Dark theme - matches our custom CSS badges
base = "dark"
primaryColor = "#4C9BE8"       # Blue for primary buttons
backgroundColor = "#0e0e1a"    # Very dark background
secondaryBackgroundColor = "#1a1a2e"  # Slightly lighter for sidebar
textColor = "#e0e0e0"          # Light text

[server]
# Maximum upload size in MB (PDFs can be large)
maxUploadSize = 50

[browser]
# Gather usage statistics? No thanks.
gatherUsageStats = false
